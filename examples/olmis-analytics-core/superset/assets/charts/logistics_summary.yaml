slice_name: "Logistics Summary Report"
viz_type: table
uuid: "c1d2e3f4-a5b6-4c7d-8e9f-000000000046"
version: "1.0.0"
dataset_uuid: "a1b2c3d4-e5f6-4a7b-8c9d-000000000010"
description: "Per-facility stock snapshot (closing balance, average monthly consumption, stock on hand) for the products that drove the most consumption in the latest reporting period. Defaults to the top 5 most-consumed products via a subquery filter."
certified_by: null
certification_details: null
is_managed_externally: false
cache_timeout: null
params:
  viz_type: table
  groupby:
    - facility_name
    - product_code
    - product_name
    - period_name
    - stock_on_hand
    - average_consumption
    - total_consumed_quantity
  metrics: []
  adhoc_filters:
    - clause: WHERE
      expressionType: SQL
      sqlExpression: |
        product_name IN (
          SELECT product_name FROM curated.mart_stock_status
          WHERE period_end_date >= toStartOfMonth(today()) - INTERVAL 1 MONTH
            AND period_end_date <= today()
            AND total_consumed_quantity IS NOT NULL
          GROUP BY product_name
          ORDER BY SUM(total_consumed_quantity) DESC
          LIMIT 5
        )
      subject: product_name
  row_limit: 10000
  order_by_cols: []
  server_pagination: true
  server_page_length: 25
  order_desc: true
  show_cell_bars: false
  color_pn: false
  table_timestamp_format: smart_date
  page_length: 25
  include_search: true
  header_font_size: 0.6
  cell_font_size: 0.6
query_context: null
