version: 2

models:
  - name: mart_facility_directory
    description: >
      Enriched facility directory with geographic zone hierarchy.
      BI contract: dashboards should query this mart, not raw tables.
    columns:
      - name: facility_id
        description: Facility UUID
        tests:
          - not_null
          - unique
      - name: facility_code
        tests:
          - not_null
      - name: facility_name
        tests:
          - not_null

  - name: mart_requisition_summary
    description: >
      Requisitions enriched with facility, program, and geographic zone names.
      BI contract: dashboards should query this mart, not raw tables.
    columns:
      - name: requisition_id
        description: Requisition UUID
        tests:
          - not_null
          - unique
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - INITIATED
                  - SUBMITTED
                  - AUTHORIZED
                  - IN_APPROVAL
                  - APPROVED
                  - RELEASED
                  - RELEASED_WITHOUT_ORDER
                  - SKIPPED
                  - REJECTED
      - name: facility_name
        tests:
          - not_null
      - name: program_name
        tests:
          - not_null

  - name: mart_stock_status
    description: >
      Stock status per requisition line item for stockout and stock level analysis.
      Joins line items with facility, product, program, and period dimensions.
      Includes all requisition statuses within a rolling 3-year window.
      BI contract: dashboards should query this mart, not raw tables.
    columns:
      - name: line_item_id
        description: Requisition line item UUID
        tests:
          - not_null
          - unique
      - name: requisition_id
        tests:
          - not_null
      - name: facility_name
        tests:
          - not_null
      - name: program_name
        tests:
          - not_null
      - name: product_code
        tests:
          - not_null
      - name: product_name
        tests:
          - not_null
      - name: stock_status
        description: "Stock level category: Stocked Out, Understocked, Adequately stocked, Overstocked, Unknown"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Stocked Out
                  - Understocked
                  - Adequately stocked
                  - Overstocked
                  - Unknown
      - name: combined_stockout
        description: "Binary flag: 1 if stocked out, 0 otherwise"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]

  - name: mart_non_reporting_facilities
    description: >
      Active facilities that did not submit a requisition for a given
      program and period. Shows reporting blind spots alongside stockout data.
      BI contract: dashboards should query this mart, not raw tables.
    columns:
      - name: facility_name
        tests:
          - not_null
      - name: program_name
        tests:
          - not_null
      - name: period_name
        tests:
          - not_null
      - name: reporting_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Did not report
