# =============================================================================
# SolDevelo Reporting Stack - Base Platform Services
# =============================================================================
# Image choices (long-term, do not change without discussion):
#   Kafka:         soldevelo/kafka 3.7  (KRaft mode, no ZooKeeper)
#   Kafka Connect: confluentinc/cp-kafka-connect 7.7.1 (Kafka 3.7.x compatible)
#   Apicurio:      apicurio/apicurio-registry 3.0 (in-memory storage, upgrade later)
#   Kafka UI:      provectuslabs/kafka-ui 0.7.2
#   ClickHouse:    clickhouse/clickhouse-server 24.8-alpine
#   Airflow:       apache/airflow 2.9.3 (LocalExecutor, PostgreSQL metadata)
#   Superset:      apache/superset 6.0.0 (ClickHouse driver via clickhouse-connect)

name: soldevelo-reporting-stack

networks:
  reporting:
    driver: bridge
  # External network shared with the source database stack (e.g., openlmis-ref-distro).
  # Created automatically by the ref-distro reporting-stack overlay compose file.
  # The source DB is accessible as 'olmis-db' on this network.
  reporting-shared:
    name: reporting-shared
    external: true

volumes:
  kafka_data:
  clickhouse_data:
  airflow_db_data:
  airflow_logs:
  superset_db_data:

services:
  # ---------------------------------------------------------------------------
  # Kafka broker – KRaft mode (single node)
  # ---------------------------------------------------------------------------
  kafka:
    image: soldevelo/kafka:3.7
    hostname: kafka
    networks:
      - reporting
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    volumes:
      - kafka_data:/soldevelo/kafka
    environment:
      # KRaft
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_KRAFT_CLUSTER_ID: "soldevelo-reporting-stack"
      # Listeners
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-9094}"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # Topic defaults (single-node)
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 | grep -q ApiVersion"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Kafka Connect (distributed mode) + Debezium + Apicurio converters
  #
  # Built from connect/Dockerfile which adds:
  #   - Debezium PostgreSQL connector plugin
  #   - Apicurio Registry Avro converter JARs
  # ---------------------------------------------------------------------------
  kafka-connect:
    build:
      context: ../connect
      dockerfile: Dockerfile
    image: soldevelo-reporting-stack/kafka-connect:latest
    hostname: kafka-connect
    networks:
      - reporting
      - reporting-shared
    depends_on:
      kafka:
        condition: service_healthy
      apicurio:
        condition: service_healthy
    ports:
      - "${CONNECT_PORT:-8083}:8083"
    environment:
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
      CONNECT_BOOTSTRAP_SERVERS: "kafka:9092"
      CONNECT_GROUP_ID: "reporting-stack-connect"
      CONNECT_CONFIG_STORAGE_TOPIC: "_connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "_connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "_connect-status"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect"
      CONNECT_REST_PORT: "8083"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Apicurio Schema Registry
  # ---------------------------------------------------------------------------
  apicurio:
    image: apicurio/apicurio-registry:3.0.6
    hostname: apicurio
    networks:
      - reporting
    ports:
      - "${APICURIO_PORT:-8085}:8080"
    environment:
      QUARKUS_HTTP_PORT: "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Kafka UI (Provectus)
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    hostname: kafka-ui
    networks:
      - reporting
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-9080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "reporting-stack"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: "connect"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: "http://kafka-connect:8083"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "http://apicurio:8080/apis/ccompat/v7"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # ClickHouse (OLAP analytics store)
  #
  # Two databases: raw (append-only CDC landing) and curated (dbt marts).
  # Kafka engine tables consume JSON CDC events directly from Kafka topics.
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    hostname: clickhouse
    networks:
      - reporting
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${CLICKHOUSE_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ../clickhouse/config/users.xml:/etc/clickhouse-server/users.d/users.xml:ro
    environment:
      CLICKHOUSE_DB: "${CLICKHOUSE_DB:-reporting}"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-default}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-changeme}"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user ${CLICKHOUSE_USER:-default} --password ${CLICKHOUSE_PASSWORD:-changeme} -q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Airflow metadata database
  # ---------------------------------------------------------------------------
  airflow-db:
    image: postgres:16-alpine
    hostname: airflow-db
    networks:
      - reporting
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: "${AIRFLOW_DB_PASSWORD:-airflow}"
      POSTGRES_DB: airflow
    mem_limit: 128m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Airflow init (one-shot: DB migrations + admin user creation)
  # ---------------------------------------------------------------------------
  airflow-init:
    build:
      context: ../airflow
      dockerfile: Dockerfile
    image: soldevelo-reporting-stack/airflow:latest
    networks:
      - reporting
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db:5432/airflow"
      AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW__CORE__FERNET_KEY}"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: "${AIRFLOW_ADMIN_USER:-admin}"
      _AIRFLOW_WWW_USER_PASSWORD: "${AIRFLOW_ADMIN_PASSWORD:-admin}"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users list 2>/dev/null | grep -qw "${AIRFLOW_ADMIN_USER:-admin}" || \
          airflow users create \
            --username "${AIRFLOW_ADMIN_USER:-admin}" \
            --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
            --firstname Admin --lastname User \
            --role Admin --email admin@example.com
        echo "Airflow init complete."
    restart: "on-failure"

  # ---------------------------------------------------------------------------
  # Airflow scheduler (LocalExecutor — runs tasks in-process)
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    image: soldevelo-reporting-stack/airflow:latest
    hostname: airflow-scheduler
    networks:
      - reporting
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db:5432/airflow"
      AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW__CORE__FERNET_KEY}"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      REPORTING_HOST_ROOT: "${REPORTING_HOST_ROOT:-}"
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ../airflow/dags:/opt/airflow/dags:ro
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - ../:/opt/reporting
    command: scheduler
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Airflow webserver
  # ---------------------------------------------------------------------------
  airflow-webserver:
    image: soldevelo-reporting-stack/airflow:latest
    hostname: airflow-webserver
    networks:
      - reporting
    depends_on:
      airflow-scheduler:
        condition: service_healthy
    env_file: ../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db:5432/airflow"
      AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW__CORE__FERNET_KEY}"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
      AIRFLOW__WEBSERVER__WORKERS: "1"
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"
    volumes:
      - ../airflow/dags:/opt/airflow/dags:ro
      - airflow_logs:/opt/airflow/logs
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    command: webserver
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Superset metadata database
  # ---------------------------------------------------------------------------
  superset-db:
    image: postgres:16-alpine
    hostname: superset-db
    networks:
      - reporting
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: "${SUPERSET_DB_PASSWORD:-superset}"
      POSTGRES_DB: superset
    mem_limit: 128m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Superset init (one-shot: DB migrations + admin user creation)
  # ---------------------------------------------------------------------------
  superset-init:
    build:
      context: ../superset
      dockerfile: Dockerfile
    image: soldevelo-reporting-stack/superset:latest
    networks:
      - reporting
    depends_on:
      superset-db:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: "${SUPERSET_SECRET_KEY:-replace-with-a-long-random-string}"
      SUPERSET_DB_PASSWORD: "${SUPERSET_DB_PASSWORD:-superset}"
      SUPERSET_ADMIN_USER: "${SUPERSET_ADMIN_USER:-admin}"
      SUPERSET_ADMIN_PASSWORD: "${SUPERSET_ADMIN_PASSWORD:-changeme}"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        superset db upgrade
        superset fab list-users 2>/dev/null | grep -qw "$${SUPERSET_ADMIN_USER}" || \
          superset fab create-admin \
            --username "$${SUPERSET_ADMIN_USER}" \
            --password "$${SUPERSET_ADMIN_PASSWORD}" \
            --firstname Admin --lastname User \
            --email admin@example.com
        superset init
        echo "Superset init complete."
    restart: "on-failure"

  # ---------------------------------------------------------------------------
  # Superset web application
  # ---------------------------------------------------------------------------
  superset:
    image: soldevelo-reporting-stack/superset:latest
    hostname: superset
    networks:
      - reporting
    depends_on:
      superset-init:
        condition: service_completed_successfully
    environment:
      SUPERSET_SECRET_KEY: "${SUPERSET_SECRET_KEY:-replace-with-a-long-random-string}"
      SUPERSET_DB_PASSWORD: "${SUPERSET_DB_PASSWORD:-superset}"
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
